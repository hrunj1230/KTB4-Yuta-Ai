<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>게시글 상세</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

  <h1>게시글 상세 페이지</h1>

  <div class="detail-box">
    <h2>게시글 {{ post_id }}</h2>

    <p>
      게시글 내용입니다.
    </p>
  </div>

  <div class="comment-section">

    <h3>댓글</h3>

    <div class="comment">
      첫 댓글입니다.
    </div>

    <div class="comment">
      두 번째 댓글입니다.
    </div>

    <textarea placeholder="댓글 입력"></textarea>

    <button>댓글 작성</button>

  </div>

</div>

</body>
</html>
